name: Stock Selection Workflow
description: Multi-factor quantitative stock selection based on Ch04 methodology
triggered_by: user_request

steps:
  - name: data_collection
    agent: data_fetcher
    input:
      asset_type: "stock"
      factors:
        - technical: [momentum, turnover, volatility]
        - fundamental: [PE, PB, ROE, revenue_growth]
        - macro: [interest_rate, inflation]
      universe: "{{ stock_universe }}"

  - name: factor_computation
    agent: quant_engine
    input:
      raw_data: "{{ data_collection.output }}"
      operations:
        - normalize: z_score
        - winsorize: [1%, 99%]
        - neutralize: [industry, market_cap]

  - name: multi_factor_model
    agent: strategist
    depends_on: factor_computation
    input:
      mode: "stock_selection"
      normalized_factors: "{{ factor_computation.output }}"
      model_type: "APT_multi_factor"
      constraints:
        max_positions: {{ max_positions }}
        sector_limits: "{{ sector_constraints }}"

  - name: portfolio_optimization
    agent: quant_engine
    depends_on: multi_factor_model
    input:
      factor_scores: "{{ multi_factor_model.output.scores }}"
      covariance_matrix: "{{ historical_returns }}"
      optimization_target: "max_sharpe"
      method: "mean_variance"

  - name: strategy_generation
    agent: strategist
    depends_on: portfolio_optimization
    input:
      optimized_portfolio: "{{ portfolio_optimization.output }}"
      include:
        - top_holdings
        - factor_weights
        - expected_return
        - expected_volatility
        - sharpe_ratio

  - name: store_results
    action: store_memory
    depends_on: strategy_generation
    input:
      type: strategy
      data: "{{ strategy_generation.output }}"

notifications:
  - on: completion
    type: slack
    channel: "#quant-strategies"
    message: "Stock selection completed. {{ strategy_generation.output.top_holdings|length }} stocks selected."

  - on: low_confidence
    type: alert
    message: "Low confidence signals detected. Manual review recommended."
